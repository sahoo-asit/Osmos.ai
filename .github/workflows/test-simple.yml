name: Test & Allure Report

on:
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Which tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - ui

  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt
      
      - name: Install Playwright
        run: |
          pip install pytest-playwright
          playwright install chromium
      
      - name: Run Tests
        run: |
          if [ "${{ github.event.inputs.test_type || 'all' }}" == "api" ]; then
            pytest tests/api -n 4 --alluredir=allure-results
          elif [ "${{ github.event.inputs.test_type || 'all' }}" == "ui" ]; then
            pytest tests/ui -n 4 --alluredir=allure-results
          else
            pytest tests/api tests/ui -n 4 --alluredir=allure-results
          fi
        continue-on-error: true
      
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
