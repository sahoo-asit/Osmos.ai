name: Run Tests & Deploy Allure Report

on:
  # Manual trigger with options
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - ui
      parallel_workers:
        description: 'Number of parallel workers'
        required: true
        default: '4'
        type: choice
        options:
          - '2'
          - '4'
          - '8'
          - '10'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-xdist allure-pytest

      - name: Install Playwright
        if: github.event.inputs.test_type == 'ui' || github.event.inputs.test_type == 'all' || github.event_name != 'workflow_dispatch'
        run: |
          pip install pytest-playwright
          playwright install chromium

      - name: Run API Tests
        if: github.event.inputs.test_type == 'api' || github.event.inputs.test_type == 'all' || github.event_name != 'workflow_dispatch'
        run: |
          python -m pytest tests/api -n ${{ github.event.inputs.parallel_workers || '4' }} --alluredir=reports/allure-results/api --tb=short
        continue-on-error: true

      - name: Run UI Tests
        if: github.event.inputs.test_type == 'ui' || github.event.inputs.test_type == 'all' || github.event_name != 'workflow_dispatch'
        run: |
          python -m pytest tests/ui -n ${{ github.event.inputs.parallel_workers || '4' }} --alluredir=reports/allure-results/ui --tb=short
        continue-on-error: true

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results
          retention-days: 7

  generate-report:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    outputs:
      api_summary: ${{ steps.counts.outputs.api_summary }}
      ui_summary: ${{ steps.counts.outputs.ui_summary }}
    steps:
      - name: Download Allure Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: reports/allure-results

      - name: Merge API and UI Results
        run: |
          mkdir -p reports/allure-results-merged
          if [ -d "reports/allure-results/api" ]; then
            cp -r reports/allure-results/api/* reports/allure-results-merged/ 2>/dev/null || true
          fi
          if [ -d "reports/allure-results/ui" ]; then
            cp -r reports/allure-results/ui/* reports/allure-results-merged/ 2>/dev/null || true
          fi
          ls -la reports/allure-results-merged/

      - name: Add Owner Info to Allure Report
        run: |
          cat > reports/allure-results-merged/environment.properties << 'EOF'
          Owner=Asit Sahoo
          Contact=https://pm-asit-sahoo.github.io/asit-portfolio/
          Mobile=9040293063
          Purpose=Educational
          Managed_By=Asit Sahoo
          EOF
          echo "Added owner info to Allure environment"

      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: reports/allure-results-merged
          allure_history: gh-pages/allure-history
          keep_reports: 20

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 7

      - name: Compute API/UI pass-fail counts
        id: counts
        if: always()
        run: |
          python <<'PY'
          import json, glob, os

          # Debug: list what's in the results directory
          print("Looking for Allure result files...")
          all_files = glob.glob('reports/allure-results-merged/**/*', recursive=True)
          print(f"Found {len(all_files)} files in reports/allure-results-merged/")
          
          # List some result files
          result_files = glob.glob('reports/allure-results-merged/*-result.json')
          print(f"Found {len(result_files)} *-result.json files")
          
          buckets = {
              'api': {'passed': 0, 'failed': 0, 'broken': 0, 'skipped': 0, 'total': 0},
              'ui': {'passed': 0, 'failed': 0, 'broken': 0, 'skipped': 0, 'total': 0},
          }

          for path in glob.glob('reports/allure-results-merged/*-result.json'):
              with open(path, 'r') as f:
                  data = json.load(f)
              status = data.get('status', 'unknown')
              # Check multiple fields for test classification
              full = data.get('fullName', '') + ' ' + data.get('name', '') + ' ' + str(data.get('labels', []))
              bucket = 'api' if 'api' in full.lower() else 'ui' if 'ui' in full.lower() else None
              if not bucket:
                  # Try to determine from file path or parent directories
                  if 'api' in path.lower():
                      bucket = 'api'
                  elif 'ui' in path.lower():
                      bucket = 'ui'
              if not bucket:
                  continue
              buckets[bucket]['total'] += 1
              if status in buckets[bucket]:
                  buckets[bucket][status] += 1
              else:
                  print(f"Unknown status '{status}' for {path}")

          def fmt(b):
              total = b['total']
              passed = b.get('passed', 0)
              failed = b.get('failed', 0)
              broken = b.get('broken', 0)
              skipped = b.get('skipped', 0)
              return f"{total} total (passed={passed}, failed={failed}, broken={broken}, skipped={skipped})"

          api_summary = fmt(buckets['api'])
          ui_summary = fmt(buckets['ui'])

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"api_summary={api_summary}\n")
              out.write(f"ui_summary={ui_summary}\n")

          print(f"API: {api_summary}")
          print(f"UI: {ui_summary}")
          PY

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
          destination_dir: allure-history

  notify:
    needs: [test, generate-report]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report Link
        run: |
          echo "✅ Tests completed!"
          echo "📊 Allure Report: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-history/"
          echo ""
          echo "Test Results Summary:"
          echo "- API Tests: ${{ needs.generate-report.outputs.api_summary || 'n/a' }}"
          echo "- UI Tests: ${{ needs.generate-report.outputs.ui_summary || 'n/a' }}"
          echo "- Report Generation: ${{ needs.generate-report.result }}"
          echo ""
          echo "Note: These tests are designed by Asit Sahoo for educational purposes and are managed by Asit Sahoo."
          echo "Contact: https://pm-asit-sahoo.github.io/asit-portfolio/ | Mob: 9040293063"
          echo ""
          echo "Message: Hey there, thanks for the opportunity at osmos.ai."
          echo "I hope the tasks and reports are impressive. If you'd like to set up the next round,"
          echo "please reach out — managed by Asit Sahoo (see contact above)."
