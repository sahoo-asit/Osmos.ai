[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --alluredir=reports/allure-results
markers =
    ui: UI automation tests (requires browser)
    api: API integration tests
    smoke: Smoke tests for critical paths
    regression: Full regression test suite
    positive: Positive test scenarios
    negative: Negative test scenarios
    boundary: Boundary and edge case tests
    security: Security-focused tests
    login: Login/authentication tests
    create: Create lead tests
    listing: Leads listing tests (view, edit, delete, search, filter, sort, pagination)

# Custom CLI options
[pytest:cli]
# Usage: pytest --env=preprod
# Note: actual --env parsing is handled in config/settings.py via sys.argv
